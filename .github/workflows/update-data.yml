name: Update Flight Deals

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时自动运行一次
  workflow_dispatch:       # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run crawler script
        run: python scripts/crawl_deals.py
        env:
          # 如果后端小哥需要用代理或第三方 API 密钥，需在 GitHub Secrets 中配置
          API_KEY: ${{ secrets.KIWI_API_KEY }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "auto: update flight deals data" || echo "No changes to commit"
          git push
